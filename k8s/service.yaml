apiVersion: v1
kind: Service
metadata:
  name: queue-app
  labels:
    app: queue-app
spec:
  type: ClusterIP
  selector:
    app: queue-app
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
# Headless service required by the StatefulSet for stable pod DNS (rabbitmq-0.rabbitmq-headless, etc.)
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-headless
  labels:
    app: rabbitmq
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: amqp
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  labels:
    app: rabbitmq
spec:
  type: ClusterIP
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: amqp
      protocol: TCP
    - name: management
      port: 15672
      targetPort: management
      protocol: TCP
